<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nyas CRM - {% block title %}Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- SVG Icons directly for aesthetics without bringing heavy libraries -->
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <!-- Nyas Logo representation -->
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:inline; vertical-align:middle; margin-right:8px;">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#60a5fa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#3b82f6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            Nyas CRM
        </div>
        <ul class="nav-links">
            <li class="nav-item">
                <a href="/" class="nav-link {% if active_tab == 'dashboard' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="/customers" class="nav-link {% if active_tab == 'customers' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                    Customers
                </a>
            </li>
            <li class="nav-item">
                <a href="/deals" class="nav-link {% if active_tab == 'deals' %}active{% endif %}">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    Deals Kanban
                </a>
            </li>
        </ul>
    </aside>
    <main class="main-content">
        <div class="topbar animate-fade-in">
            <h1 class="page-title">{% block page_title %}Dashboard{% endblock %}</h1>
            <div class="user-profile">
                <!-- Simple placeholder for aesthetic completeness -->
                <div style="width:40px;height:40px;border-radius:50%;background: linear-gradient(135deg, #a78bfa, #3b82f6);display:flex;align-items:center;justify-content:center;font-weight:bold;">
                    A
                </div>
            </div>
        </div>
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
